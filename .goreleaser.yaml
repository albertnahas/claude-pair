version: 2
project_name: claude-pair

builds:
  - main: ./cmd/claude-pair/
    binary: claude-pair
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: albertnahas
      name: homebrew-tap
    homepage: https://github.com/albertnahas/claude-pair
    description: Real-time pair programming with shared Claude Code sessions
    license: MIT
    dependencies:
      - name: tmux
      - name: upterm
        type: optional
    install: |
      bin.install "claude-pair"

changelog:
  sort: asc
